<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0f172a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="MyH Tablero"/>
  <title>MyH Arquitectos — Tablero</title>
  <link rel="manifest" href="manifest.json"/>
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  
  <!-- jsPDF para generar informes -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
  
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --navy:#0f172a;--navy2:#1e293b;--bg:#f1f5f9;--card:#fff;
      --text:#0f172a;--sub:#64748b;--muted:#94a3b8;--border:#e2e8f0;
      --indigo:#6366f1;--indigo-l:#eef2ff;
      --green:#22c55e;--green-l:#dcfce7;
      --yellow:#eab308;--yellow-l:#fef9c3;
      --red:#ef4444;--red-l:#fee2e2;
      --pink:#ec4899;--pink-l:#fce7f3;
      --blue:#3b82f6;--blue-l:#dbeafe;
      --amber:#f59e0b;--amber-l:#fffbeb;
      --admin:#7c3aed;--admin-l:#ede9fe;
    }
    html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);-webkit-tap-highlight-color:transparent}
    #app{max-width:480px;margin:0 auto;min-height:100vh}
    #main{display:flex;flex-direction:column;min-height:100vh}
    #main-body{flex:1;position:relative}
    
    /* ── VISTA PC (≥900px) ─────────────────────────── */
    @media (min-width: 900px) {
      #app{max-width:1400px}
      #main{display:flex;flex-direction:column;min-height:100vh}
      #header{padding:20px 32px}
      #main-body{display:flex;flex:1;min-height:0}
      #tab-bar{position:sticky!important;top:0;flex-direction:column!important;width:220px!important;min-width:220px!important;max-width:220px!important;height:calc(100vh - 80px)!important;border-top:none!important;border-right:1px solid var(--border)!important;box-shadow:none!important;padding:16px 0!important;left:auto!important;right:auto!important;bottom:auto!important;transform:none!important;background:#fafbfc!important;flex-shrink:0!important}
      #content{flex:1;padding:32px;overflow-y:auto;min-width:0}
      .tab-btn{padding:12px 20px;flex-direction:row!important;justify-content:flex-start!important;gap:12px;border-radius:0;border-left:3px solid transparent;flex:none!important}
      .tab-btn.active{background:var(--indigo-l);border-left-color:var(--indigo)}
      .tab-btn.active::after{display:none!important}
      .tab-icon{font-size:18px}
      .tab-label{font-size:13px;text-transform:none;letter-spacing:0;color:var(--text)}
      .tab-btn.active .tab-label{color:var(--indigo)}
      .kpi-grid{grid-template-columns:repeat(6,1fr)!important}
      .modal-overlay{align-items:center!important}
      .modal-box{max-width:560px!important;border-radius:16px!important;padding:32px!important;max-height:85vh}
      .pc-table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
      .pc-table th{background:#f8fafc;padding:12px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)}
      .pc-table td{padding:14px 16px;border-bottom:1px solid #f1f5f9;font-size:13px;color:var(--text);vertical-align:middle}
      .pc-table tr:hover{background:#fafbfc;cursor:pointer}
      .pc-table tr:last-child td{border-bottom:none}
      .btn-add{padding:12px 20px;font-size:14px;width:auto;display:inline-block;margin-bottom:20px}
      .pc-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
      .pc-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
      .alert-bar{margin-top:0!important}
      .dashboard-grid{grid-template-columns:repeat(4,1fr)}
      #content{padding-bottom:32px}
    }

    /* LOGIN */
    #login{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;background:var(--navy)}
    .login-logo{font-size:52px;margin-bottom:8px}
    .login-title{font-size:24px;font-weight:800;color:#f8fafc;margin-bottom:4px}
    .login-sub{font-size:13px;color:var(--sub);margin-bottom:32px}
    .login-card{background:#1e293b;border-radius:20px;padding:28px 22px;width:100%}
    .login-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:7px}
    .login-select,.login-input{width:100%;padding:13px 15px;border-radius:12px;border:1.5px solid #334155;background:#0f172a;color:#f8fafc;font-size:15px;margin-bottom:16px;outline:none;font-family:inherit;appearance:none}
    .login-select:focus,.login-input:focus{border-color:var(--indigo)}

    /* ROLE SELECTOR */
    .role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    .role-btn{padding:14px;border-radius:12px;border:1.5px solid #334155;background:transparent;color:#94a3b8;cursor:pointer;font-family:inherit;text-align:center;transition:all .2s}
    .role-btn.active{border-color:var(--indigo);background:#1e3a5f;color:#93c5fd}
    .role-btn.active-admin{border-color:var(--admin);background:#2e1065;color:#c4b5fd}
    .role-icon{font-size:24px;display:block;margin-bottom:6px}
    .role-name{font-size:13px;font-weight:700}
    .role-desc{font-size:10px;opacity:.7;margin-top:2px}

    .login-btn{width:100%;padding:14px;background:var(--indigo);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
    .login-btn.admin-btn{background:var(--admin)}
    .login-error{font-size:12px;color:#fca5a5;text-align:center;margin-top:10px;display:none}

    /* HEADER */
    #header{background:var(--navy);padding:18px 16px 14px;position:sticky;top:0;z-index:10}
    .header-top{display:flex;justify-content:space-between;align-items:flex-start}
    .header-brand{font-size:11px;color:var(--sub);letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
    .header-title{font-size:19px;font-weight:800;color:#f8fafc}
    .header-right{display:flex;align-items:center;gap:8px}
    .role-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px}
    .role-badge.equipo{background:var(--indigo-l);color:#4338ca}
    .role-badge.admin{background:var(--admin-l);color:#5b21b6}
    .status-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
    .alert-bar{margin-top:10px;padding:8px 12px;background:rgba(127,29,29,.15);border-radius:10px;border:1px solid rgba(239,68,68,.3);display:flex;gap:12px;flex-wrap:wrap}
    .alert-chip{font-size:12px;color:#fca5a5}

    /* TABS */
    #tab-bar{position:fixed;bottom:0;left:0;right:0;width:100%;background:#fff;border-top:1px solid var(--border);display:flex;z-index:20;box-shadow:0 -4px 20px rgba(0,0,0,.06);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    #tab-bar::-webkit-scrollbar{display:none}
    .tab-btn{flex:0 0 auto;min-width:64px;padding:8px 6px 10px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;position:relative}
    .tab-icon{font-size:18px}
    .tab-label{font-size:9px;font-weight:700;letter-spacing:.03em;color:var(--muted);text-transform:uppercase;white-space:nowrap}
    .tab-btn.active .tab-label{color:var(--indigo)}
    .tab-btn.active::after{content:'';position:absolute;bottom:0;width:20px;height:3px;background:var(--indigo);border-radius:2px}

    /* CONTENT */
    #content{padding:16px 14px 100px}

    /* KPIs */
    .kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
    .kpi-card{background:#fff;border-radius:12px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
    .kpi-label{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
    .kpi-value{font-size:22px;font-weight:800;color:var(--text)}
    .kpi-subtitle{font-size:10px;color:var(--muted);margin-top:2px}

    /* PROYECTO CARDS */
    .proyecto-card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer;transition:transform .15s,box-shadow .15s}
    .proyecto-card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
    .proyecto-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
    .proyecto-nombre{font-size:15px;font-weight:700;color:var(--text);flex:1}
    .proyecto-cliente{font-size:12px;color:var(--sub);margin-bottom:8px}
    .proyecto-stats{display:flex;gap:12px}
    .proyecto-stat{font-size:11px;color:var(--muted)}
    .proyecto-stat strong{color:var(--text);font-weight:700}
    
    /* HITO/ACCION CARDS */
    .card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04);cursor:pointer}
    .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
    .card-title{font-size:14px;font-weight:700;color:var(--text);flex:1}
    .badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;white-space:nowrap}
    .badge.completado{background:var(--green-l);color:#15803d}
    .badge.entregado{background:var(--green-l);color:#15803d}
    .badge.a-tiempo{background:var(--blue-l);color:#1e40af}
    .badge.en-curso{background:var(--blue-l);color:#1e40af}
    .badge.pendiente{background:var(--yellow-l);color:#a16207}
    .badge.en-riesgo{background:var(--yellow-l);color:#a16207}
    .badge.bloqueada{background:var(--red-l);color:#b91c1c}
    .badge.retrasado{background:var(--red-l);color:#b91c1c}
    .badge.alta{background:var(--red-l);color:#b91c1c}
    .badge.media{background:var(--yellow-l);color:#a16207}
    .badge.baja{background:var(--green-l);color:#15803d}
    .card-meta{font-size:11px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap;margin-top:6px}
    
    /* DASHBOARD "HOY" */
    .dashboard-section{margin-bottom:20px}
    .dashboard-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:8px}
    .dashboard-count{font-size:12px;background:var(--indigo-l);color:var(--indigo);padding:2px 8px;border-radius:10px;font-weight:700}
    .alert-card{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;border-left:4px solid var(--red);cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .alert-card.warning{border-left-color:var(--yellow)}
    .alert-card.info{border-left-color:var(--blue)}
    .alert-card.success{border-left-color:var(--green)}
    .alert-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
    .alert-meta{font-size:11px;color:var(--sub);display:flex;gap:10px;flex-wrap:wrap}
    .dashboard-empty{text-align:center;padding:20px;color:var(--muted);font-size:13px;font-style:italic}
    .dashboard-hero{background:linear-gradient(135deg,var(--navy),#1e293b);color:#fff;border-radius:16px;padding:16px 18px;margin-bottom:16px}
    .dashboard-hero-title{font-size:18px;font-weight:800;margin-bottom:3px}
    .dashboard-hero-sub{font-size:12px;opacity:.8}
    .dashboard-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    .mini-stat{background:#fff;border-radius:12px;padding:12px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .mini-stat-value{font-size:22px;font-weight:800;line-height:1}
    .mini-stat-value.red{color:var(--red)}
    .mini-stat-value.yellow{color:#ca8a04}
    .mini-stat-value.green{color:var(--green)}
    .mini-stat-value.blue{color:var(--blue)}
    .mini-stat-label{font-size:11px;color:var(--sub);margin-top:4px;font-weight:600}
    
    /* VISTA EQUIPO */
    .persona-card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer}
    .persona-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .persona-nombre{font-size:15px;font-weight:700;color:var(--text)}
    .persona-total{font-size:12px;background:var(--indigo-l);color:var(--indigo);padding:3px 10px;border-radius:10px;font-weight:700}
    .persona-stats{display:flex;gap:12px;flex-wrap:wrap}
    .persona-stat{font-size:11px;color:var(--sub)}
    .persona-stat strong{color:var(--text);font-weight:700;font-size:13px}
    .persona-stat.red strong{color:var(--red)}
    .persona-stat.yellow strong{color:#ca8a04}
    .persona-stat.green strong{color:var(--green)}
    
    /* INFORMES */
    .informe-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer;transition:transform .15s,box-shadow .15s}
    .informe-card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
    .informe-header{display:flex;align-items:center;gap:12px;margin-bottom:8px}
    .informe-icon{font-size:28px}
    .informe-title{font-size:15px;font-weight:700;color:var(--text)}
    .informe-desc{font-size:12px;color:var(--sub);line-height:1.4}
    .informe-selector{background:#fff;border-radius:12px;padding:14px;margin-top:10px;display:none;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .informe-selector.active{display:block}
    .btn-descargar{background:var(--green);color:#fff;padding:10px 16px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px;width:100%;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-add{width:100%;padding:12px;background:var(--indigo);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-primary{width:100%;padding:12px;background:var(--indigo);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}
    .btn-danger{width:100%;padding:12px;background:var(--red);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}
    
    /* FILTROS */
    .filter-chips{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .filter-chip{padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;color:var(--text);cursor:pointer;white-space:nowrap;transition:all .2s}
    .filter-chip.active{background:var(--indigo);color:#fff;border-color:var(--indigo)}
    
    /* MODAL */
    .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:flex-end;justify-content:center}
    .modal-box{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:20px 18px 24px}
    .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
    .modal-title{font-size:18px;font-weight:800}
    .modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--muted);padding:0;line-height:1}
    
    /* FORMS */
    .form-group{margin-bottom:14px}
    .form-label{display:block;font-size:12px;font-weight:700;color:var(--sub);margin-bottom:6px}
    .form-input,.form-select,.form-textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;background:#fff;outline:none}
    .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--indigo)}
    .form-textarea{resize:vertical;min-height:80px}
    .form-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    
    /* TOAST */
    .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:200;display:none}
    
    /* LOADING */
    #loading{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
    .loading-logo{font-size:64px;margin-bottom:16px;animation:pulse 2s ease-in-out infinite}
    .loading-text{font-size:16px;font-weight:700;color:#f8fafc}
    @keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
    
    /* SYNC INDICATOR */
    .sync-indicator{position:fixed;bottom:80px;right:20px;background:var(--green);color:#fff;padding:8px 14px;border-radius:20px;font-size:11px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.15);z-index:50;display:none;align-items:center;gap:6px}
    .sync-dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:blink 1.5s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
  </style>
</head>
<body>

<div id="loading">
  <div class="loading-logo">🏗️</div>
  <div class="loading-text">MyH Arquitectos</div>
</div>

<div id="app" style="display:none">
  <!-- LOGIN -->
  <div id="login">
    <div class="login-logo">🏗️</div>
    <div class="login-title">MyH Arquitectos</div>
    <div class="login-sub">Tablero de Proyectos</div>
    <div class="login-card">
      <label class="login-label">Usuario</label>
      <select class="login-select" id="login-user">
        <option value="">Selecciona tu nombre</option>
        <option value="Paula Herrera">Paula Herrera</option>
        <option value="Claudio Leiva">Claudio Leiva</option>
        <option value="José Halty">José Halty</option>
        <option value="Patricia Muñoz">Patricia Muñoz</option>
      </select>
      <label class="login-label">Contraseña</label>
      <input type="password" class="login-input" id="login-pass" placeholder="••••••••"/>
      <button class="login-btn" id="login-btn" onclick="login()">Entrar</button>
      <div class="login-error" id="login-error">❌ Contraseña incorrecta</div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="main" style="display:none">
    <div id="header"></div>
    <div id="main-body">
      <div id="tab-bar"></div>
      <div id="content"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- SYNC INDICATOR -->
<div class="sync-indicator" id="sync-indicator">
  <div class="sync-dot"></div>
  <span>Sincronizando...</span>
</div>

<script>
// ══════════════════════════════════════════════════════
// FIREBASE CONFIG
// ══════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyBoYrfIEy_0fUipt12GIGfWPaIguuXvWk",
  authDomain: "myh-arquitectos.firebaseapp.com",
  databaseURL: "https://myh-arquitectos-default-rtdb.firebaseio.com",
  projectId: "myh-arquitectos",
  storageBucket: "myh-arquitectos.firebasestorage.app",
  messagingSenderId: "635426083940",
  appId: "1:635426083940:web:754e169bc59f0c44b83b71"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ══════════════════════════════════════════════════════
// STATE & USUARIOS
// ══════════════════════════════════════════════════════
// Usuarios: { nombre: { pass, role } }
const USUARIOS = {
  "Paula Herrera":   { pass: "myh_1910",  role: "admin" },
  "Claudio Leiva":   { pass: "myh_7421",  role: "equipo" },
  "José Halty":      { pass: "myh_2465",  role: "equipo" },
  "Patricia Muñoz":  { pass: "myh_1960",  role: "equipo" }
};

// Lista base de responsables (se amplía con los que agregues en Admin)
const RESPONSABLES = [
  "Paula Herrera",
  "Juan Pablo Torres",
  "Rodrigo Escobar",
  "Carla Vergara"
];

// Lista dinámica de responsables desde Firebase
function getResponsables() {
  const excluidos = STATE.excluidos || [];
  const fromState = (STATE.responsables || []).map(r => r.nombre);
  const base = RESPONSABLES.filter(r => !excluidos.includes(r));
  return [...new Set([...base, ...fromState.filter(r => !excluidos.includes(r))])];
}

function responsablesOptions(selected = "") {
  return `<option value="">Sin asignar</option>` + getResponsables().map(r =>
    `<option value="${r}" ${r === selected ? "selected" : ""}>${r}</option>`
  ).join("");
}

// Estados tipo semáforo

// ══════════════════════════════════════════════════════
// FIREBASE SYNC
// ══════════════════════════════════════════════════════
let syncTimeout = null;

function showSyncIndicator() {
  const indicator = document.getElementById("sync-indicator");
  indicator.style.display = "flex";
  clearTimeout(syncTimeout);
  syncTimeout = setTimeout(() => {
    indicator.style.display = "none";
  }, 2000);
}

function saveToFirebase() {
  if (!STATE.user) return;
  showSyncIndicator();
  db.ref('tablero').set({
    proyectos: STATE.proyectos,
    hitos: STATE.hitos,
    acciones: STATE.acciones,
    adminTareas: STATE.adminTareas || [],
    responsables: STATE.responsables || [],
    excluidos: STATE.excluidos || [],
    lastUpdate: Date.now(),
    lastUser: STATE.user
  }).catch(err => {
    console.error("Error guardando en Firebase:", err);
    showToast("⚠️ Error al sincronizar");
  });
}

function loadFromFirebase() {
  return new Promise((resolve) => {
    db.ref('tablero').once('value', (snapshot) => {
      const data = snapshot.val();
      if (data) {
        STATE.proyectos = data.proyectos || [];
        STATE.hitos = data.hitos || [];
        STATE.acciones = data.acciones || [];
        STATE.adminTareas = data.adminTareas || [];
        STATE.responsables = data.responsables || [];
        STATE.excluidos = data.excluidos || [];
      }
      resolve();
    });
  });
}

// Escuchar cambios en tiempo real
function listenToFirebase() {
  db.ref('tablero').on('value', (snapshot) => {
    const data = snapshot.val();
    if (data && data.lastUser !== STATE.user) {
      // Otro usuario hizo cambios
      STATE.proyectos = data.proyectos || [];
      STATE.hitos = data.hitos || [];
      STATE.acciones = data.acciones || [];
      STATE.adminTareas = data.adminTareas || [];
      render();
      showToast("🔄 Datos actualizados");
    }
  });
}

window.login = async function() {
  const user = document.getElementById("login-user").value;
  const pass = document.getElementById("login-pass").value;
  
  if (!user || !USUARIOS[user]) {
    document.getElementById("login-error").style.display = "block";
    document.getElementById("login-error").textContent = "❌ Selecciona un usuario";
    return;
  }
  
  if (pass !== USUARIOS[user].pass) {
    document.getElementById("login-error").style.display = "block";
    document.getElementById("login-error").textContent = "❌ Contraseña incorrecta";
    return;
  }
  
  const role = USUARIOS[user].role;
  STATE.user = user;
  STATE.role = role;
  
  localStorage.setItem("myh-user", user);
  localStorage.setItem("myh-role", role);
  
  document.getElementById("login").style.display = "none";
  
  // Cargar datos de Firebase
  await loadFromFirebase();
  listenToFirebase();
  
  showMain();
  render();
  showToast(`👋 Hola, ${user.split(" ")[0]}!`);
};

// Filtra hitos cuando cambia el proyecto en el formulario de acción
window.filtrarHitosPorProyecto = function(proyecto) {
  const select = document.getElementById("f-hito");
  if (!select) return;
  const hitos = STATE.hitos.filter(h => h.proyecto === proyecto);
  select.innerHTML = `<option value="">Sin hito</option>` +
    hitos.map(h => `<option value="${h.id}">${h.hito}</option>`).join("");
};

window.addAccion = function() {
  const accion = document.getElementById("f-accion").value.trim();
  if (!accion) {
    showToast("⚠️ Escribe una descripción");
    return;
  }

  const hitoId = document.getElementById("f-hito")?.value || "";
  const hitoObj = STATE.hitos.find(h => h.id === hitoId);

  STATE.acciones.push({
    id: "a" + Date.now(),
    accion,
    proyecto: document.getElementById("f-proyecto").value,
    hitoId: hitoId,
    hito: hitoObj?.hito || "",
    estado: document.getElementById("f-estado").value,
    prioridad: document.getElementById("f-prioridad").value,
    responsable: document.getElementById("f-responsable").value,
    fecha: document.getElementById("f-fecha").value,
    comentario: document.getElementById("f-comentario").value
  });

  closeModal();
  render();
  saveToFirebase();
  showToast("✅ Acción agregada");
};

window.editarAccion = function(id) {
  const a = STATE.acciones.find(x => x.id === id);
  if (!a) return;
  
  const proyectos = STATE.proyectos.map(p =>
    `<option ${p.nombre === a.proyecto ? "selected" : ""}>${p.nombre}</option>`
  ).join("");

  const hitosDelProyecto = STATE.hitos
    .filter(h => h.proyecto === a.proyecto)
    .map(h => `<option value="${h.id}" ${h.id === a.hitoId ? "selected" : ""}>${h.hito}</option>`)
    .join("");
  
  const estados = ["Pendiente", "En curso", "Bloqueada", "Completada"].map(e =>
    `<option ${e === a.estado ? "selected" : ""}>${e}</option>`
  ).join("");
  
  const prioridades = ["Alta", "Media", "Baja"].map(p =>
    `<option ${p === a.prioridad ? "selected" : ""}>${p}</option>`
  ).join("");
  
  openModal(`
    <div class="modal-head">
      <span class="modal-title">Editar Acción</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Acción</label>
      <input class="form-input" id="f-accion" value="${a.accion}"/>
    </div>
    <div class="form-group">
      <label class="form-label">Proyecto</label>
      <select class="form-select" id="f-proyecto" onchange="filtrarHitosPorProyecto(this.value)">${proyectos}</select>
    </div>
    <div class="form-group">
      <label class="form-label">Hito relacionado</label>
      <select class="form-select" id="f-hito">
        <option value="">Sin hito</option>
        ${hitosDelProyecto}
      </select>
    </div>
    <div class="form-row2">
      <div class="form-group">
        <label class="form-label">Estado</label>
        <select class="form-select" id="f-estado">${estados}</select>
      </div>
      <div class="form-group">
        <label class="form-label">Prioridad</label>
        <select class="form-select" id="f-prioridad">${prioridades}</select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Responsable</label>
      <select class="form-select" id="f-responsable">
        ${responsablesOptions(a.responsable)}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Fecha</label>
      <input class="form-input" id="f-fecha" value="${a.fecha || ""}"/>
    </div>
    <div class="form-group">
      <label class="form-label">Comentario</label>
      <textarea class="form-textarea" id="f-comentario">${a.comentario || ""}</textarea>
    </div>
    <button class="btn-primary" onclick="saveAccion('${id}')">💾 Guardar</button>
    <button class="btn-danger" onclick="deleteAccion('${id}')">🗑 Eliminar</button>
  `);
};

window.saveAccion = function(id) {
  const i = STATE.acciones.findIndex(x => x.id === id);
  if (i < 0) return;

  const hitoId = document.getElementById("f-hito")?.value || "";
  const hitoObj = STATE.hitos.find(h => h.id === hitoId);
  
  STATE.acciones[i] = {
    ...STATE.acciones[i],
    accion: document.getElementById("f-accion").value,
    proyecto: document.getElementById("f-proyecto").value,
    hitoId: hitoId,
    hito: hitoObj?.hito || "",
    estado: document.getElementById("f-estado").value,
    prioridad: document.getElementById("f-prioridad").value,
    responsable: document.getElementById("f-responsable").value,
    fecha: document.getElementById("f-fecha").value,
    comentario: document.getElementById("f-comentario").value
  };
  
  closeModal();
  render();
  saveToFirebase();
  showToast("✅ Acción guardada");
};

window.deleteAccion = function(id) {
  if (!confirm("¿Eliminar esta acción?")) return;
  
  STATE.acciones = STATE.acciones.filter(x => x.id !== id);
  closeModal();
  render();
  saveToFirebase();
  showToast("✅ Acción eliminada");
};

// ══════════════════════════════════════════════════════
// DASHBOARD "HOY" - Lo que necesita tu atención
// ══════════════════════════════════════════════════════
function renderHoy() {
  const hoy = new Date();
  hoy.setHours(0, 0, 0, 0);
  
  const atrasados = STATE.hitos.filter(h => {
    if (!h.fechaFin) return h.estado === "Retrasado";
    const d = daysDiff(h.fechaFin);
    return (d < 0 && h.estado !== "Entregado" && h.estado !== "Completado") || h.estado === "Retrasado";
  });
  
  const enRiesgo = STATE.hitos.filter(h => {
    if (!h.fechaFin) return h.estado === "En riesgo";
    const d = daysDiff(h.fechaFin);
    return (d >= 0 && d <= 7 && h.estado !== "Entregado" && h.estado !== "Completado") || h.estado === "En riesgo";
  });
  
  const venceHoy = STATE.hitos.filter(h => {
    if (!h.fechaFin) return false;
    const d = daysDiff(h.fechaFin);
    return d === 0 && h.estado !== "Entregado" && h.estado !== "Completado";
  });
  
  const accionesPendientes = STATE.acciones.filter(a => 
    a.estado !== "Completada" && a.estado !== "Entregado"
  );
  
  // Resumen por responsable
  const porResponsable = {};
  getResponsables().forEach(r => {
    porResponsable[r] = {
      hitos: 0,
      atrasados: 0,
      enRiesgo: 0,
      acciones: 0
    };
  });
  
  STATE.hitos.forEach(h => {
    if (h.responsable && porResponsable[h.responsable]) {
      if (h.estado !== "Entregado" && h.estado !== "Completado") {
        porResponsable[h.responsable].hitos++;
        if (h.estado === "Retrasado" || (h.fechaFin && daysDiff(h.fechaFin) < 0)) {
          porResponsable[h.responsable].atrasados++;
        }
        if (h.estado === "En riesgo") {
          porResponsable[h.responsable].enRiesgo++;
        }
      }
    }
  });
  
  STATE.acciones.forEach(a => {
    if (a.responsable && porResponsable[a.responsable] && a.estado !== "Completada") {
      porResponsable[a.responsable].acciones++;
    }
  });
  
  const fechaHoy = hoy.toLocaleDateString('es-CL', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  
  return `
    <div class="dashboard-hero">
      <div class="dashboard-hero-title">👋 Hola, ${STATE.user.split(" ")[0]}</div>
      <div class="dashboard-hero-sub">${fechaHoy}</div>
    </div>
    
    <div class="dashboard-grid">
      <div class="mini-stat">
        <div class="mini-stat-value red">${atrasados.length}</div>
        <div class="mini-stat-label">🔴 Atrasados</div>
      </div>
      <div class="mini-stat">
        <div class="mini-stat-value yellow">${enRiesgo.length}</div>
        <div class="mini-stat-label">🟡 En riesgo</div>
      </div>
      <div class="mini-stat">
        <div class="mini-stat-value blue">${venceHoy.length}</div>
        <div class="mini-stat-label">📅 Vencen hoy</div>
      </div>
      <div class="mini-stat">
        <div class="mini-stat-value green">${accionesPendientes.length}</div>
        <div class="mini-stat-label">✅ Acciones</div>
      </div>
    </div>
    
    ${atrasados.length > 0 ? `
      <div class="dashboard-section">
        <div class="dashboard-title">
          🔴 Atrasados
          <span class="dashboard-count">${atrasados.length}</span>
        </div>
        ${atrasados.slice(0, 10).map(h => `
          <div class="alert-card" onclick="STATE.tab='hitos';render();setTimeout(()=>editarHito('${h.id}'),100)">
            <div class="alert-title">${h.hito}</div>
            <div class="alert-meta">
              <span>📁 ${h.proyecto}</span>
              ${h.responsable ? `<span>👤 ${h.responsable}</span>` : ""}
              ${h.fechaFin ? `<span>📅 ${h.fechaFin}</span>` : ""}
            </div>
          </div>
        `).join("")}
      </div>
    ` : ""}
    
    ${enRiesgo.length > 0 ? `
      <div class="dashboard-section">
        <div class="dashboard-title">
          🟡 En riesgo (próximos 7 días)
          <span class="dashboard-count">${enRiesgo.length}</span>
        </div>
        ${enRiesgo.slice(0, 10).map(h => `
          <div class="alert-card warning" onclick="STATE.tab='hitos';render();setTimeout(()=>editarHito('${h.id}'),100)">
            <div class="alert-title">${h.hito}</div>
            <div class="alert-meta">
              <span>📁 ${h.proyecto}</span>
              ${h.responsable ? `<span>👤 ${h.responsable}</span>` : ""}
              ${h.fechaFin ? `<span>📅 ${h.fechaFin}</span>` : ""}
            </div>
          </div>
        `).join("")}
      </div>
    ` : ""}
    
    ${venceHoy.length > 0 ? `
      <div class="dashboard-section">
        <div class="dashboard-title">
          📅 Vencen hoy
          <span class="dashboard-count">${venceHoy.length}</span>
        </div>
        ${venceHoy.map(h => `
          <div class="alert-card info" onclick="STATE.tab='hitos';render();setTimeout(()=>editarHito('${h.id}'),100)">
            <div class="alert-title">${h.hito}</div>
            <div class="alert-meta">
              <span>📁 ${h.proyecto}</span>
              ${h.responsable ? `<span>👤 ${h.responsable}</span>` : ""}
            </div>
          </div>
        `).join("")}
      </div>
    ` : ""}
    
    <div class="dashboard-section">
      <div class="dashboard-title">
        👥 Carga del equipo
      </div>
      ${getResponsables().map(r => {
        const data = porResponsable[r];
        const total = data.hitos + data.acciones;
        if (total === 0) return "";
        return `
          <div class="persona-card" onclick="STATE.tab='equipo';render()">
            <div class="persona-header">
              <div class="persona-nombre">${r}</div>
              <div class="persona-total">${total} tareas</div>
            </div>
            <div class="persona-stats">
              <div class="persona-stat"><strong>${data.hitos}</strong> hitos</div>
              ${data.atrasados > 0 ? `<div class="persona-stat red">🔴 <strong>${data.atrasados}</strong> atrasados</div>` : ""}
              ${data.enRiesgo > 0 ? `<div class="persona-stat yellow">🟡 <strong>${data.enRiesgo}</strong> en riesgo</div>` : ""}
              <div class="persona-stat"><strong>${data.acciones}</strong> acciones</div>
            </div>
          </div>
        `;
      }).join("")}
    </div>
    
    ${atrasados.length === 0 && enRiesgo.length === 0 && venceHoy.length === 0 ? `
      <div class="dashboard-empty">
        ✨ ¡Todo bajo control! No hay tareas urgentes.
      </div>
    ` : ""}
  `;
}

// ══════════════════════════════════════════════════════
// VISTA "EQUIPO" - Resumen por persona
// ══════════════════════════════════════════════════════
function renderEquipo() {
  const personas = {};
  getResponsables().forEach(r => {
    personas[r] = {
      hitos: [],
      acciones: []
    };
  });
  
  STATE.hitos.forEach(h => {
    if (h.responsable && personas[h.responsable]) {
      personas[h.responsable].hitos.push(h);
    }
  });
  
  STATE.acciones.forEach(a => {
    if (a.responsable && personas[a.responsable]) {
      personas[a.responsable].acciones.push(a);
    }
  });
  
  return `
    <div class="dashboard-hero">
      <div class="dashboard-hero-title">👥 Equipo MyH</div>
      <div class="dashboard-hero-sub">Tareas asignadas a cada persona</div>
    </div>
    
    ${getResponsables().map(r => {
      const data = personas[r];
      const pendientes = data.hitos.filter(h => h.estado !== "Entregado" && h.estado !== "Completado");
      const atrasados = pendientes.filter(h => h.estado === "Retrasado" || (h.fechaFin && daysDiff(h.fechaFin) < 0));
      const enRiesgo = pendientes.filter(h => h.estado === "En riesgo");
      const aTiempo = pendientes.filter(h => h.estado === "A tiempo" || h.estado === "En curso" || h.estado === "Pendiente");
      const accionesPend = data.acciones.filter(a => a.estado !== "Completada");
      
      return `
        <div class="dashboard-section">
          <div class="persona-card">
            <div class="persona-header">
              <div class="persona-nombre">👤 ${r}</div>
              <div class="persona-total">${pendientes.length + accionesPend.length} tareas</div>
            </div>
            <div class="persona-stats">
              ${atrasados.length > 0 ? `<div class="persona-stat red">🔴 <strong>${atrasados.length}</strong> atrasados</div>` : ""}
              ${enRiesgo.length > 0 ? `<div class="persona-stat yellow">🟡 <strong>${enRiesgo.length}</strong> en riesgo</div>` : ""}
              ${aTiempo.length > 0 ? `<div class="persona-stat green">🟢 <strong>${aTiempo.length}</strong> a tiempo</div>` : ""}
              <div class="persona-stat"><strong>${accionesPend.length}</strong> acciones</div>
            </div>
          </div>
          
          ${pendientes.length > 0 ? `
            <div style="margin-top:10px">
              ${pendientes.slice(0, 5).map(h => `
                <div class="card" onclick="editarHito('${h.id}')">
                  <div class="card-header">
                    <div class="card-title">${h.hito}</div>
                    <span class="badge ${(h.estado || "").toLowerCase().replace(/ /g,"-")}">${h.estado || "-"}</span>
                  </div>
                  <div class="card-meta">
                    <span>📁 ${h.proyecto}</span>
                    ${h.fechaFin ? `<span>📅 ${h.fechaFin}</span>` : ""}
                  </div>
                </div>
              `).join("")}
              ${pendientes.length > 5 ? `<div style="text-align:center;padding:8px;color:var(--sub);font-size:12px">... y ${pendientes.length - 5} más</div>` : ""}
            </div>
          ` : `<div class="dashboard-empty">Sin tareas pendientes</div>`}
        </div>
      `;
    }).join("")}
  `;
}

// GENERADORES DE PDF
// ══════════════════════════════════════════════════════
function iniciarPDF(titulo) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  
  // Header con colores MyH
  doc.setFillColor(15, 23, 42);
  doc.rect(0, 0, 210, 30, "F");
  
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(18);
  doc.setFont("helvetica", "bold");
  doc.text("MyH Arquitectos", 14, 14);
  
  doc.setFontSize(11);
  doc.setFont("helvetica", "normal");
  doc.text(titulo, 14, 22);
  
  doc.setTextColor(100, 116, 139);
  doc.setFontSize(9);
  const hoy = new Date().toLocaleDateString('es-CL', {day:'numeric', month:'long', year:'numeric'});
  doc.text(`Generado: ${hoy}`, 140, 22);
  
  doc.setTextColor(0, 0, 0);
  return doc;
}

window.generarInformeEjecutivo = function() {
  const doc = iniciarPDF("Resumen Ejecutivo");
  let y = 40;
  
  // Estadísticas generales
  doc.setFontSize(13);
  doc.setFont("helvetica", "bold");
  doc.text("📊 Panorama General", 14, y);
  y += 8;
  
  const totalProyectos = STATE.proyectos.length;
  const totalHitos = STATE.hitos.length;
  const atrasados = STATE.hitos.filter(h => h.estado === "Retrasado" || (h.fechaFin && daysDiff(h.fechaFin) < 0 && h.estado !== "Entregado" && h.estado !== "Completado")).length;
  const enRiesgo = STATE.hitos.filter(h => h.estado === "En riesgo").length;
  const completados = STATE.hitos.filter(h => h.estado === "Entregado" || h.estado === "Completado").length;
  const avance = totalHitos > 0 ? Math.round(completados / totalHitos * 100) : 0;
  
  doc.autoTable({
    startY: y,
    head: [["Métrica", "Valor"]],
    body: [
      ["Proyectos activos", totalProyectos.toString()],
      ["Total de hitos", totalHitos.toString()],
      ["Hitos completados", `${completados} (${avance}%)`],
      ["Hitos atrasados", atrasados.toString()],
      ["Hitos en riesgo", enRiesgo.toString()],
      ["Acciones pendientes", STATE.acciones.filter(a => a.estado !== "Completada").length.toString()]
    ],
    theme: "striped",
    headStyles: { fillColor: [99, 102, 241] }
  });
  
  y = doc.lastAutoTable.finalY + 12;
  
  // Proyectos
  if (STATE.proyectos.length > 0) {
    doc.setFontSize(13);
    doc.setFont("helvetica", "bold");
    doc.text("🏗️ Proyectos", 14, y);
    y += 6;
    
    const proyectosData = STATE.proyectos.map(p => {
      const hitos = STATE.hitos.filter(h => h.proyecto === p.nombre);
      const comp = hitos.filter(h => h.estado === "Entregado" || h.estado === "Completado").length;
      return [p.nombre, p.cliente || "-", `${comp}/${hitos.length}`, STATE.acciones.filter(a => a.proyecto === p.nombre).length.toString()];
    });
    
    doc.autoTable({
      startY: y,
      head: [["Proyecto", "Cliente", "Hitos", "Acciones"]],
      body: proyectosData,
      theme: "striped",

function fechaArchivo() {
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
}

        ${t.fecha ? `<span>📅 ${t.fecha}</span>` : ""}

  `).join("");

  return `
    <div class="dashboard-section">
      <div class="dashboard-title">👥 Equipo y Responsables <span style="font-size:11px;color:var(--sub);font-weight:400">${todosResp.length} personas</span></div>
      <button class="btn-add" style="margin-bottom:14px" onclick="openNuevoResponsable()">➕ Agregar Responsable</button>

      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">

    </div>

      <input class="form-input" id="f-resp-email" placeholder="correo@ejemplo.com"/>

    <button class="btn-primary" onclick="addResponsable()">➕ Agregar</button>
  `);

window.addResponsable = function() {
  const nombre = document.getElementById("f-resp-nombre").value.trim();
  if (!nombre) { showToast("⚠️ Escribe un nombre"); return; }
  
  if (!STATE.responsables) STATE.responsables = [];
  
  // Verificar que no exista ya
  if (STATE.responsables.find(r => r.nombre.toLowerCase() === nombre.toLowerCase())) {
    showToast("⚠️ Ese responsable ya existe");
    return;
  }
  
  STATE.responsables.push({
    id: "r" + Date.now(),
    nombre,
    email: document.getElementById("f-resp-email").value.trim()
  });
  
  closeModal();
  render();
  saveToFirebase();
  showToast(`✅ ${nombre} agregado al equipo`);
};

window.eliminarResponsable = function(nombre) {
  if (!confirm(`¿Eliminar a ${nombre} del equipo?`)) return;
  
  // Si está en la lista base, lo agregamos a una lista de "excluidos"
  if (!STATE.excluidos) STATE.excluidos = [];
  if (!STATE.excluidos.includes(nombre)) {
    STATE.excluidos.push(nombre);
  }
  
  // Si también está en Firebase, lo eliminamos de ahí
  STATE.responsables = (STATE.responsables || []).filter(r => r.nombre !== nombre);
  
  render();
  saveToFirebase();
  showToast(`✅ ${nombre} eliminado del equipo`);
};

window.editarTareaAdmin = function(id) {

  const estados = ["Pendiente", "En curso", "Completada"].map(e =>
    `<option ${e === t.estado ? "selected" : ""}>${e}</option>`
  ).join("");
  
  openModal(`
    <div class="modal-head">
      <span class="modal-title">Editar Tarea</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    ...STATE.adminTareas[i],
    nombre: document.getElementById("f-nombre").value,
    tipo: document.getElementById("f-tipo").value,
    estado: document.getElementById("f-estado").value,
    fecha: document.getElementById("f-fecha").value,
    comentario: document.getElementById("f-comentario").value
  };
  
  closeModal();
  render();
  saveToFirebase();
  showToast("✅ Tarea guardada");
};

window.eliminarTareaAdmin = function(id) {

// ══════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════
function daysDiff(dateStr) {
  if (!dateStr) return 999;
  const parts = dateStr.split("/");
  if (parts.length !== 3) return 999;
  const d = new Date(parts[2], parts[1] - 1, parts[0]);
  const today = new Date();
  const diff = Math.ceil((d - today) / (1000 * 60 * 60 * 24));
  return diff;
}

function openModal(html) {
  document.getElementById("modal").innerHTML = `<div class="modal-box">${html}</div>`;
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

window.closeModal = closeModal;

function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.style.display = "block";
  setTimeout(() => toast.style.display = "none", 3000);
}

window.cerrarSesion = function() {
  if (!confirm("¿Cerrar sesión?")) return;
  localStorage.removeItem("myh-user");
  localStorage.removeItem("myh-role");
  STATE.user = null;
  STATE.role = "equipo";
  db.ref('tablero').off(); // Detener escucha de Firebase
  document.getElementById("main").style.display = "none";
  document.getElementById("login").style.display = "flex";
  document.getElementById("login-user").value = "";
  document.getElementById("login-pass").value = "";
  document.getElementById("login-error").style.display = "none";
};

window.switchTab = function(tab, el) {
  STATE.tab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  render();
};

window.setFiltroH = function(f) {
  STATE.filtroH = f;
  render();
};

window.setFiltroA = function(f) {
  STATE.filtroA = f;
  render();
};

// INIT
// ══════════════════════════════════════════════════════
window.addEventListener("resize", () => {
  if (STATE.user) render();
});

window.addEventListener("DOMContentLoaded", async () => {
  setTimeout(async () => {
    document.getElementById("loading").style.display = "none";
    document.getElementById("app").style.display = "block";
    
    const savedUser = localStorage.getItem("myh-user");
    const savedRole = localStorage.getItem("myh-role");
    
    if (savedUser && USUARIOS[savedUser]) {
      STATE.user = savedUser;
      STATE.role = USUARIOS[savedUser].role || savedRole || "equipo";
      
      await loadFromFirebase();
      listenToFirebase();
      
      showMain();
      render();
      showToast(`👋 Bienvenid@ ${savedUser.split(" ")[0]}!`);
    } else {
      document.getElementById("login").style.display = "flex";
    }
  }, 1200);
});
