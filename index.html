<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0f172a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="MyH Tablero"/>
  <title>MyH Arquitectos — Tablero</title>
  <link rel="manifest" href="manifest.json"/>
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --navy:#0f172a;--navy2:#1e293b;--bg:#f1f5f9;--card:#fff;
      --text:#0f172a;--sub:#64748b;--muted:#94a3b8;--border:#e2e8f0;
      --indigo:#6366f1;--indigo-l:#eef2ff;
      --green:#22c55e;--green-l:#dcfce7;
      --yellow:#eab308;--yellow-l:#fef9c3;
      --red:#ef4444;--red-l:#fee2e2;
      --pink:#ec4899;--pink-l:#fce7f3;
      --blue:#3b82f6;--blue-l:#dbeafe;
      --amber:#f59e0b;--amber-l:#fffbeb;
      --admin:#7c3aed;--admin-l:#ede9fe;
    }
    html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);-webkit-tap-highlight-color:transparent}
    #app{max-width:480px;margin:0 auto;min-height:100vh}
    
    /* ── VISTA PC (≥900px) ─────────────────────────── */
    @media (min-width: 900px) {
      #app{max-width:1400px;display:grid;grid-template-columns:240px 1fr;grid-template-rows:auto 1fr}
      #header{grid-column:1/3;padding:20px 32px}
      #tab-bar{position:relative;flex-direction:column;width:240px;max-width:240px;height:auto;border-top:none;border-right:1px solid var(--border);box-shadow:none;padding:20px 0;left:0;transform:none;background:#fafbfc}
      .tab-btn{padding:14px 20px;flex-direction:row;justify-content:flex-start;gap:14px;border-radius:0;border-left:3px solid transparent}
      .tab-btn.active{background:var(--indigo-l);border-left-color:var(--indigo)}
      .tab-icon{font-size:20px}
      .tab-label{font-size:14px;text-transform:none;letter-spacing:0}
      #content{padding:32px 32px 32px 32px;overflow-y:auto}
      .kpi-grid{grid-template-columns:repeat(6,1fr)!important}
      .modal-overlay{align-items:center!important}
      .modal-box{max-width:560px!important;border-radius:16px!important;padding:32px!important;max-height:85vh}
      /* Tabla en hitos */
      .pc-table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
      .pc-table th{background:#f8fafc;padding:12px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)}
      .pc-table td{padding:14px 16px;border-bottom:1px solid #f1f5f9;font-size:13px;color:var(--text);vertical-align:middle}
      .pc-table tr:hover{background:#fafbfc;cursor:pointer}
      .pc-table tr:last-child td{border-bottom:none}
      /* Botones más grandes en PC */
      .btn-add{padding:12px 20px;font-size:14px;width:auto;display:inline-block;margin-bottom:20px}
      /* Cards de proyecto en grid */
      .pc-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
      .pc-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
      .alert-bar{margin-top:0!important}
    }

    /* LOGIN */
    #login{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;background:var(--navy)}
    .login-logo{font-size:52px;margin-bottom:8px}
    .login-title{font-size:24px;font-weight:800;color:#f8fafc;margin-bottom:4px}
    .login-sub{font-size:13px;color:var(--sub);margin-bottom:32px}
    .login-card{background:#1e293b;border-radius:20px;padding:28px 22px;width:100%}
    .login-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:7px}
    .login-select,.login-input{width:100%;padding:13px 15px;border-radius:12px;border:1.5px solid #334155;background:#0f172a;color:#f8fafc;font-size:15px;margin-bottom:16px;outline:none;font-family:inherit;appearance:none}
    .login-select:focus,.login-input:focus{border-color:var(--indigo)}

    /* ROLE SELECTOR */
    .role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    .role-btn{padding:14px;border-radius:12px;border:1.5px solid #334155;background:transparent;color:#94a3b8;cursor:pointer;font-family:inherit;text-align:center;transition:all .2s}
    .role-btn.active{border-color:var(--indigo);background:#1e3a5f;color:#93c5fd}
    .role-btn.active-admin{border-color:var(--admin);background:#2e1065;color:#c4b5fd}
    .role-icon{font-size:24px;display:block;margin-bottom:6px}
    .role-name{font-size:13px;font-weight:700}
    .role-desc{font-size:10px;opacity:.7;margin-top:2px}

    .login-btn{width:100%;padding:14px;background:var(--indigo);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
    .login-btn.admin-btn{background:var(--admin)}
    .login-error{font-size:12px;color:#fca5a5;text-align:center;margin-top:10px;display:none}

    /* HEADER */
    #header{background:var(--navy);padding:18px 16px 14px;position:sticky;top:0;z-index:10}
    .header-top{display:flex;justify-content:space-between;align-items:flex-start}
    .header-brand{font-size:11px;color:var(--sub);letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
    .header-title{font-size:19px;font-weight:800;color:#f8fafc}
    .header-right{display:flex;align-items:center;gap:8px}
    .role-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px}
    .role-badge.equipo{background:var(--indigo-l);color:#4338ca}
    .role-badge.admin{background:var(--admin-l);color:#5b21b6}
    .status-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
    .alert-bar{margin-top:10px;padding:8px 12px;background:rgba(127,29,29,.15);border-radius:10px;border:1px solid rgba(239,68,68,.3);display:flex;gap:12px;flex-wrap:wrap}
    .alert-chip{font-size:12px;color:#fca5a5}

    /* TABS */
    #tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid var(--border);display:flex;z-index:20;box-shadow:0 -4px 20px rgba(0,0,0,.06)}
    .tab-btn{flex:1;padding:10px 4px 12px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative}
    .tab-icon{font-size:20px}
    .tab-label{font-size:10px;font-weight:700;letter-spacing:.04em;color:var(--muted);text-transform:uppercase}
    .tab-btn.active .tab-label{color:var(--indigo)}
    .tab-btn.active::after{content:'';position:absolute;bottom:0;width:20px;height:3px;background:var(--indigo);border-radius:2px}

    /* CONTENT */
    #content{padding:16px 14px 90px}

    /* KPIs */
    .kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
    .kpi-card{background:#fff;border-radius:12px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
    .kpi-label{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
    .kpi-value{font-size:22px;font-weight:800;color:var(--text)}
    .kpi-subtitle{font-size:10px;color:var(--muted);margin-top:2px}

    /* PROYECTO CARDS */
    .proyecto-card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer;transition:transform .15s,box-shadow .15s}
    .proyecto-card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
    .proyecto-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
    .proyecto-nombre{font-size:15px;font-weight:700;color:var(--text);flex:1}
    .proyecto-cliente{font-size:12px;color:var(--sub);margin-bottom:8px}
    .proyecto-stats{display:flex;gap:12px}
    .proyecto-stat{font-size:11px;color:var(--muted)}
    .proyecto-stat strong{color:var(--text);font-weight:700}
    
    /* HITO/ACCION CARDS */
    .card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04);cursor:pointer}
    .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
    .card-title{font-size:14px;font-weight:700;color:var(--text);flex:1}
    .badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;white-space:nowrap}
    .badge.completado{background:var(--green-l);color:#15803d}
    .badge.en-curso{background:var(--blue-l);color:#1e40af}
    .badge.pendiente{background:var(--yellow-l);color:#a16207}
    .badge.bloqueada{background:var(--red-l);color:#b91c1c}
    .badge.alta{background:var(--red-l);color:#b91c1c}
    .badge.media{background:var(--yellow-l);color:#a16207}
    .badge.baja{background:var(--green-l);color:#15803d}
    .card-meta{font-size:11px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap;margin-top:6px}
    
    /* BOTONES */
    .btn-add{width:100%;padding:12px;background:var(--indigo);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-primary{width:100%;padding:12px;background:var(--indigo);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}
    .btn-danger{width:100%;padding:12px;background:var(--red);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px}
    
    /* FILTROS */
    .filter-chips{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .filter-chip{padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;color:var(--text);cursor:pointer;white-space:nowrap;transition:all .2s}
    .filter-chip.active{background:var(--indigo);color:#fff;border-color:var(--indigo)}
    
    /* MODAL */
    .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:flex-end;justify-content:center}
    .modal-box{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:20px 18px 24px}
    .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
    .modal-title{font-size:18px;font-weight:800}
    .modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--muted);padding:0;line-height:1}
    
    /* FORMS */
    .form-group{margin-bottom:14px}
    .form-label{display:block;font-size:12px;font-weight:700;color:var(--sub);margin-bottom:6px}
    .form-input,.form-select,.form-textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;background:#fff;outline:none}
    .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--indigo)}
    .form-textarea{resize:vertical;min-height:80px}
    .form-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    
    /* TOAST */
    .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:200;display:none}
    
    /* LOADING */
    #loading{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
    .loading-logo{font-size:64px;margin-bottom:16px;animation:pulse 2s ease-in-out infinite}
    .loading-text{font-size:16px;font-weight:700;color:#f8fafc}
    @keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
    
    /* SYNC INDICATOR */
    .sync-indicator{position:fixed;bottom:80px;right:20px;background:var(--green);color:#fff;padding:8px 14px;border-radius:20px;font-size:11px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.15);z-index:50;display:none;align-items:center;gap:6px}
    .sync-dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:blink 1.5s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
  </style>
</head>
<body>

<div id="loading">
  <div class="loading-logo">🏗️</div>
  <div class="loading-text">MyH Arquitectos</div>
</div>

<div id="app" style="display:none">
  <!-- LOGIN -->
  <div id="login">
    <div class="login-logo">🏗️</div>
    <div class="login-title">MyH Arquitectos</div>
    <div class="login-sub">Tablero de Proyectos</div>
    <div class="login-card">
      <label class="login-label">Usuario</label>
      <select class="login-select" id="login-user">
        <option value="">Selecciona tu nombre</option>
        <option value="Paula Herrera">Paula Herrera</option>
        <option value="Martín Díaz">Martín Díaz</option>
        <option value="José Halty">José Halty</option>
      </select>
      <label class="login-label">Rol</label>
      <div class="role-grid">
        <button class="role-btn active" id="role-equipo" onclick="selectRole('equipo')">
          <span class="role-icon">👷</span>
          <div class="role-name">Equipo</div>
          <div class="role-desc">Ver y editar</div>
        </button>
        <button class="role-btn" id="role-admin" onclick="selectRole('admin')">
          <span class="role-icon">⚙️</span>
          <div class="role-name">Admin</div>
          <div class="role-desc">Gestión total</div>
        </button>
      </div>
      <label class="login-label">Contraseña</label>
      <input type="password" class="login-input" id="login-pass" placeholder="••••••••"/>
      <button class="login-btn" id="login-btn" onclick="login()">Entrar</button>
      <div class="login-error" id="login-error">❌ Contraseña incorrecta</div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="main" style="display:none">
    <div id="header"></div>
    <div id="tab-bar"></div>
    <div id="content"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- SYNC INDICATOR -->
<div class="sync-indicator" id="sync-indicator">
  <div class="sync-dot"></div>
  <span>Sincronizando...</span>
</div>

<script>
// ══════════════════════════════════════════════════════
// FIREBASE CONFIG
// ══════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyBoYrfIEy_0fUipt12GIGfWPaIguuXvWk",
  authDomain: "myh-arquitectos.firebaseapp.com",
  databaseURL: "https://myh-arquitectos-default-rtdb.firebaseio.com",
  projectId: "myh-arquitectos",
  storageBucket: "myh-arquitectos.firebasestorage.app",
  messagingSenderId: "635426083940",
  appId: "1:635426083940:web:754e169bc59f0c44b83b71"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ══════════════════════════════════════════════════════
// STATE & USUARIOS
// ══════════════════════════════════════════════════════
const USUARIOS = {
  "Paula Herrera": "myh2024admin",
  "Martín Díaz": "myh2024",
  "José Halty": "myh2024"
};

let STATE = {
  user: null,
  role: "equipo",
  tab: "proyectos",
  proyectos: [],
  hitos: [],
  acciones: [],
  adminTareas: [],
  filtroH: "todos",
  filtroA: "todos"
};

// ══════════════════════════════════════════════════════
// FIREBASE SYNC
// ══════════════════════════════════════════════════════
let syncTimeout = null;

function showSyncIndicator() {
  const indicator = document.getElementById("sync-indicator");
  indicator.style.display = "flex";
  clearTimeout(syncTimeout);
  syncTimeout = setTimeout(() => {
    indicator.style.display = "none";
  }, 2000);
}

function saveToFirebase() {
  if (!STATE.user) return;
  
  showSyncIndicator();
  
  db.ref('tablero').set({
    proyectos: STATE.proyectos,
    hitos: STATE.hitos,
    acciones: STATE.acciones,
    adminTareas: STATE.adminTareas || [],
    lastUpdate: Date.now(),
    lastUser: STATE.user
  }).catch(err => {
    console.error("Error guardando en Firebase:", err);
    showToast("⚠️ Error al sincronizar");
  });
}

function loadFromFirebase() {
  return new Promise((resolve) => {
    db.ref('tablero').once('value', (snapshot) => {
      const data = snapshot.val();
      if (data) {
        STATE.proyectos = data.proyectos || [];
        STATE.hitos = data.hitos || [];
        STATE.acciones = data.acciones || [];
        STATE.adminTareas = data.adminTareas || [];
      }
      resolve();
    });
  });
}

// Escuchar cambios en tiempo real
function listenToFirebase() {
  db.ref('tablero').on('value', (snapshot) => {
    const data = snapshot.val();
    if (data && data.lastUser !== STATE.user) {
      // Otro usuario hizo cambios
      STATE.proyectos = data.proyectos || [];
      STATE.hitos = data.hitos || [];
      STATE.acciones = data.acciones || [];
      STATE.adminTareas = data.adminTareas || [];
      render();
      showToast("🔄 Datos actualizados");
    }
  });
}

// ══════════════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════════════
let selectedRole = "equipo";

window.selectRole = function(role) {
  selectedRole = role;
  document.querySelectorAll(".role-btn").forEach(b => {
    b.classList.remove("active", "active-admin");
  });
  const btn = document.getElementById(`role-${role}`);
  btn.classList.add(role === "admin" ? "active-admin" : "active");
  
  const loginBtn = document.getElementById("login-btn");
  loginBtn.classList.toggle("admin-btn", role === "admin");
};

window.login = async function() {
  const user = document.getElementById("login-user").value;
  const pass = document.getElementById("login-pass").value;
  
  if (!user || !USUARIOS[user]) {
    document.getElementById("login-error").style.display = "block";
    document.getElementById("login-error").textContent = "❌ Selecciona un usuario";
    return;
  }
  
  if (pass !== USUARIOS[user]) {
    document.getElementById("login-error").style.display = "block";
    document.getElementById("login-error").textContent = "❌ Contraseña incorrecta";
    return;
  }
  
  STATE.user = user;
  STATE.role = selectedRole;
  
  localStorage.setItem("myh-user", user);
  localStorage.setItem("myh-role", selectedRole);
  
  document.getElementById("login").style.display = "none";
  
  // Cargar datos de Firebase
  await loadFromFirebase();
  listenToFirebase();
  
  showMain();
  render();
  showToast(`👋 Hola, ${user.split(" ")[0]}!`);
};

function showMain() {
  document.getElementById("main").style.display = "block";
}

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
function render() {
  renderHeader();
  renderTabs();
  renderContent();
}

function renderHeader() {
  const alertas = STATE.hitos.filter(h => {
    if (!h.fechaFin) return false;
    const diff = daysDiff(h.fechaFin);
    return diff <= 7 && diff >= 0 && h.estado !== "Completado";
  });
  
  const alertHTML = alertas.length > 0 
    ? `<div class="alert-bar">${alertas.map(a => 
        `<span class="alert-chip">⚠️ ${a.hito} (${daysDiff(a.fechaFin)}d)</span>`
      ).join("")}</div>`
    : "";
  
  document.getElementById("header").innerHTML = `
    <div class="header-top">
      <div>
        <div class="header-brand">MyH Arquitectos</div>
        <div class="header-title">Tablero de Proyectos</div>
      </div>
      <div class="header-right">
        <div class="status-dot"></div>
        <div class="role-badge ${STATE.role}">${STATE.role === "admin" ? "Admin" : "Equipo"}</div>
      </div>
    </div>
    ${alertHTML}
  `;
}

function renderTabs() {
  const tabs = [
    { id: "proyectos", icon: "🏗️", label: "Proyectos" },
    { id: "hitos", icon: "🎯", label: "Hitos" },
    { id: "acciones", icon: "✅", label: "Acciones" },
    { id: "kpis", icon: "📊", label: "KPIs" }
  ];
  
  if (STATE.role === "admin") {
    tabs.push({ id: "admin", icon: "⚙️", label: "Admin" });
  }
  
  document.getElementById("tab-bar").innerHTML = tabs.map(t => `
    <button class="tab-btn ${STATE.tab === t.id ? "active" : ""}" onclick="switchTab('${t.id}', this)">
      <div class="tab-icon">${t.icon}</div>
      <div class="tab-label">${t.label}</div>
    </button>
  `).join("");
}

function renderContent() {
  const c = document.getElementById("content");
  
  if (STATE.tab === "proyectos") c.innerHTML = renderProyectos();
  else if (STATE.tab === "hitos") c.innerHTML = renderHitos();
  else if (STATE.tab === "acciones") c.innerHTML = renderAcciones();

        ${t.fecha ? `<span>📅 ${t.fecha}</span>` : ""}
      </div>
    </div>
  `).join("");
  
  return `
    <button class="btn-add" onclick="openNuevaTareaAdmin()">➕ Nueva Tarea Admin</button>
    ${tareas}
  `;
}

window.openNuevaTareaAdmin = function() {
  openModal(`
    <div class="modal-head">
      <span class="modal-title">Nueva Tarea Admin</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Tarea</label>
      <input class="form-input" id="f-nombre" placeholder="Ej: Enviar factura"/>
    </div>
    <div class="form-row2">
      <div class="form-group">
        <label class="form-label">Tipo</label>
        <select class="form-select" id="f-tipo">
          <option>Factura</option>
          <option>Presupuesto</option>
          <option>Contrato</option>
          <option>Cobro</option>
          <option>General</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Estado</label>
        <select class="form-select" id="f-estado">
          <option>Pendiente</option>
          <option>En curso</option>
          <option>Completada</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Fecha</label>
      <input class="form-input" id="f-fecha" placeholder="dd/mm/aaaa"/>
    </div>
    <div class="form-group">
      <label class="form-label">Comentario</label>
      <textarea class="form-textarea" id="f-comentario" placeholder="Detalles..."></textarea>
    </div>
    <button class="btn-primary" onclick="addTareaAdmin()">➕ Agregar</button>
  `);
};

window.addTareaAdmin = function() {
  const nombre = document.getElementById("f-nombre").value.trim();
  if (!nombre) {
    showToast("⚠️ Escribe un nombre");
    return;
  }
  
  if (!STATE.adminTareas) STATE.adminTareas = [];
  
  STATE.adminTareas.push({
    id: "ad" + Date.now(),
    nombre,
    tipo: document.getElementById("f-tipo").value,
    estado: document.getElementById("f-estado").value,
    fecha: document.getElementById("f-fecha").value,
    comentario: document.getElementById("f-comentario").value
  });
  
  closeModal();
  render();
  saveToFirebase();
  showToast("✅ Tarea agregada");
};

window.editarTareaAdmin = function(id) {
  const t = STATE.adminTareas.find(x => x.id === id);
  if (!t) return;
  
  const tipos = ["Factura", "Presupuesto", "Contrato", "Cobro", "General"].map(tipo =>
    `<option ${tipo === t.tipo ? "selected" : ""}>${tipo}</option>`
  ).join("");
  
  const estados = ["Pendiente", "En curso", "Completada"].map(e =>
    `<option ${e === t.estado ? "selected" : ""}>${e}</option>`
  ).join("");
  
  openModal(`
    <div class="modal-head">
      <span class="modal-title">Editar Tarea</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Tarea</label>
      <input class="form-input" id="f-nombre" value="${t.nombre}"/>
    </div>
    <div class="form-row2">
      <div class="form-group">
        <label class="form-label">Tipo</label>
        <select class="form-select" id="f-tipo">${tipos}</select>
      </div>
      <div class="form-group">
        <label class="form-label">Estado</label>
        <select class="form-select" id="f-estado">${estados}</select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Fecha</label>
      <input class="form-input" id="f-fecha" value="${t.fecha || ""}"/>
    </div>
    <div class="form-group">
      <label class="form-label">Comentario</label>
      <textarea class="form-textarea" id="f-comentario">${t.comentario || ""}</textarea>
    </div>
    <button class="btn-primary" onclick="saveTareaAdmin('${id}')">💾 Guardar</button>
    <button class="btn-danger" onclick="eliminarTareaAdmin('${id}')">🗑 Eliminar</button>
  `);
};

window.saveTareaAdmin = function(id) {
  const i = STATE.adminTareas.findIndex(x => x.id === id);
  if (i < 0) return;
  
  STATE.adminTareas[i] = {
    ...STATE.adminTareas[i],
    nombre: document.getElementById("f-nombre").value,
    tipo: document.getElementById("f-tipo").value,
    estado: document.getElementById("f-estado").value,
    fecha: document.getElementById("f-fecha").value,
    comentario: document.getElementById("f-comentario").value
  };
  
  closeModal();
  render();
  saveToFirebase();
  showToast("✅ Tarea guardada");
};

window.eliminarTareaAdmin = function(id) {
  if (!confirm("¿Eliminar?")) return;
  
  STATE.adminTareas = STATE.adminTareas.filter(t => t.id !== id);
  closeModal();
  render();
  saveToFirebase();
  showToast("✅ Tarea eliminada");
};

// ══════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════
function daysDiff(dateStr) {
  if (!dateStr) return 999;
  const parts = dateStr.split("/");
  if (parts.length !== 3) return 999;
  const d = new Date(parts[2], parts[1] - 1, parts[0]);
  const today = new Date();
  const diff = Math.ceil((d - today) / (1000 * 60 * 60 * 24));
  return diff;
}

function openModal(html) {
  document.getElementById("modal").innerHTML = `<div class="modal-box">${html}</div>`;
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

window.closeModal = closeModal;

function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.style.display = "block";
  setTimeout(() => toast.style.display = "none", 3000);
}

window.switchTab = function(tab, el) {
  STATE.tab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  render();
};

window.setFiltroH = function(f) {
  STATE.filtroH = f;
  render();
};

window.setFiltroA = function(f) {
  STATE.filtroA = f;
  render();
};

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
window.addEventListener("resize", () => {
  if (STATE.user) render();
});

window.addEventListener("DOMContentLoaded", async () => {
  setTimeout(async () => {
    document.getElementById("loading").style.display = "none";
    document.getElementById("app").style.display = "block";
    
    const savedUser = localStorage.getItem("myh-user");
    const savedRole = localStorage.getItem("myh-role");
    
    if (savedUser && USUARIOS[savedUser]) {
      STATE.user = savedUser;
      STATE.role = savedRole || "equipo";
      
      await loadFromFirebase();
      listenToFirebase();
      
      showMain();
      render();
      showToast(`👋 Bienvenid@ ${savedUser.split(" ")[0]}!`);
    } else {
      document.getElementById("login").style.display = "flex";
    }
  }, 1200);
});
</script>
